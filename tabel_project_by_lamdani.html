<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>6.12 LATIHAN MEMBUAT TABEL</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>


</head>

<body>

<table border="2" bordercolor="red" width="600" height="250" cellspacing="15" cellpadding="10" bgcolor="#2dd12a">
	<tr bgcolor="yellow">
		<th colspan="5">JADWAL PELAJARAN</th>
	</tr>

	<tr>
		<td rowspan="3">INFO</td>
		<th>Hari</th>
		<th>Jam Masuk</th>
		<th>Jam Keluar</th>
		<th>Mata Kuliah</th>
	</tr>

	<tr align="center">
		<td>Senin</td>
		<td>7:00&nbsp;<strong>AM</strong></td>
		<td>8:30&nbsp;<strong>AM</strong></td>
		<td>Kriptografi</td>
	</tr>

</table>

</body>

</html>
